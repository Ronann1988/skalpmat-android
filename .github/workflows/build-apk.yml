name: Build Android APK

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    
    container:
      image: docker://ghcr.io/kivy/buildozer:1.4.0
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Copy bot files
        run: |
          if [ -f "../Desktop/dist/synergy_bot_v6.py" ]; then
            cp ../Desktop/dist/synergy_bot_v6.py synergy_bot_v7.py
          fi
          if [ -f "../Desktop/dist/.env" ]; then
            cp ../Desktop/dist/.env .env
          fi
          ls -la
      
      - name: Build APK
        run: |
          if [ ! -f buildozer.spec ]; then
            buildozer init
          fi
          buildozer -v android debug
        
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: skalpmat-apk
          path: bin/*.apk
          retention-days: 30