name: Build Android APK

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.8'
      
      - name: Install Buildozer requirements
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git \
            ffmpeg \
            libsdl2-dev \
            libsdl2-image-dev \
            libsdl2-ttf-dev \
            libsdl2-gfx-dev \
            libfreetype6-dev \
            libjpeg-dev \
            libtiff-dev \
            tcl-dev \
            tk-dev \
            libsmpeg-dev \
            libgtk-3-dev \
            libgl1-mesa-dev \
            libglu1-mesa-dev \
            autoconf \
            automake \
            build-essential \
            cmake \
            libtool \
            pkg-config \
            zip \
            unzip \
            wget \
            curl \
            openjdk-11-jdk \
            libncurses5 \
            libbz2-dev \
            libffi-dev \
            libsqlite3-dev \
            libreadline-dev \
            libssl-dev
      
      - name: Install Buildozer
        run: |
          pip install --upgrade pip
          pip install buildozer==1.5.0
          pip install cython==0.29.33
          pip install -r requirements.txt
      
      - name: Copy bot files
        run: |
          if [ -f "../Desktop/dist/synergy_bot_v6.py" ]; then
            cp ../Desktop/dist/synergy_bot_v6.py synergy_bot_v7.py
          fi
          if [ -f "../Desktop/dist/.env" ]; then
            cp ../Desktop/dist/.env .env
          fi
          ls -la
      
      - name: Build APK
        run: |
          if [ ! -f buildozer.spec ]; then
            buildozer init
          fi
          buildozer -v android debug
        
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: skalpmat-apk
          path: bin/*.apk
          retention-days: 30